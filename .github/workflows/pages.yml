# GitHub Pages deploy for the Equity Opportunity Scoreboard (PUBLIC, crashandlearn).
#
# Drop this at `.github/workflows/pages.yml` in the PUBLIC repo
# (crashandlearn/equity-scoreboard). On push to main it builds the Next static
# export and publishes it to Pages. The board is static — no server, no secret.
#
# If the repo is served at a subpath (https://<user>.github.io/equity-scoreboard),
# set NEXT_PUBLIC_BASE_PATH to "/equity-scoreboard" so asset + board.json URLs
# resolve. For a user/org root or custom domain, leave it empty.
#
# Auto-refresh fast-follow: the scheduled engine (refresh.yml) commits a fresh
# board.json to main using GITHUB_TOKEN. By GitHub design, a push made with
# GITHUB_TOKEN does NOT trigger another workflow via the `push` event — so that
# refresh commit would never republish the site. The `workflow_run` trigger below
# closes that gap: it fires this deploy AFTER "Refresh scoreboard (scheduled
# engine run)" completes successfully. workflow_run is NOT subject to the
# GITHUB_TOKEN loop-block, so the daily data refresh now auto-redeploys.

name: Deploy scoreboard to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Refresh scoreboard (scheduled engine run)"]
    types:
      - completed
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # For a push / manual dispatch, always run. For a workflow_run trigger, only
    # deploy when the refresh actually SUCCEEDED — workflow_run fires on every
    # `completed` (including a failed refresh), and a failed refresh leaves the
    # last-good board.json untouched, so there is nothing new to publish.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: viewer
    env:
      NEXT_PUBLIC_BASE_PATH: /equity-scoreboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - run: npm ci
      - run: npx next build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
