# GitHub Pages deploy for the Equity Opportunity Scoreboard (PUBLIC, crashandlearn).
#
# Drop this at `.github/workflows/pages.yml` in the PUBLIC repo
# (crashandlearn/equity-scoreboard). On push to main it builds the Next static
# export and publishes it to Pages. The board is static — no server, no secret.
#
# If the repo is served at a subpath (https://<user>.github.io/equity-scoreboard),
# set NEXT_PUBLIC_BASE_PATH to "/equity-scoreboard" so asset + board.json URLs
# resolve. For a user/org root or custom domain, leave it empty.
#
# Auto-refresh fast-follow: add a second job (or a separate scheduled workflow)
# that re-runs the scoring engine, commits the fresh public/board.json, and lets
# this workflow rebuild — or have the engine push board.json straight to the
# gh-pages artefact. A current snapshot is committed for v1.

name: Deploy scoreboard to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    env:
      NEXT_PUBLIC_BASE_PATH: /equity-scoreboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viewer/package-lock.json
      - run: npm ci
      - run: npx next build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
